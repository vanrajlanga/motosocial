# ─────────────────────────────────────────────────────────────────────────────
# Plesk → Domain → Apache & nginx Settings → Additional nginx directives
# ─────────────────────────────────────────────────────────────────────────────
# Paste the block below. It does three things:
#   1. Reverse-proxies /api/* to the Node backend on 127.0.0.1:4000
#   2. Reverse-proxies /uploads/* to the same backend (Imagen output is served
#      from disk by the backend; nginx could also serve directly, but this
#      keeps a single source of truth and lets the backend do auth later)
#   3. SPA fallback: any unknown path falls back to /index.html so React Router
#      handles it client-side instead of nginx returning 404.
# ─────────────────────────────────────────────────────────────────────────────

# Reverse-proxy the REST API
location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    client_max_body_size 50m;
}

# Reverse-proxy the uploaded / generated images
location /uploads/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cache_valid 200 1y;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# SPA fallback for React Router — sends every other path to index.html
location / {
    try_files $uri $uri/ /index.html;
}
